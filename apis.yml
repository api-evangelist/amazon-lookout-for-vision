aid: amazon-lookout-for-vision
name: Amazon Lookout for Vision
description: >-
  Amazon Lookout for Vision is a machine learning service that spots defects
  and anomalies in visual representations using computer vision. With just a
  small sample of images, it builds a custom computer vision model to enable
  you to identify damaged products or issues before production issues arise.
